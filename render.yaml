services:
  - type: web
    name: collaborative-whiteboard
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node_modules/.bin/tsx server/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
